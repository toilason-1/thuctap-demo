    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #0f1117;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #splash.hiding {
        opacity: 0;
        pointer-events: none;
      }
      .splash-wordmark {
        margin-top: 18px;
        font-family: system-ui, sans-serif;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: rgba(110, 231, 183, 0.7);
      }

      /*
       * Windows 10 Dotted Loading Spinner
       * Customization via CSS variables:
       * --spinner-size: Overall size (default: 50px)
       * --spinner-scale: Scale factor (default: 0.8)
       * --dot-size: Size of each dot (default: 10px)
       * --dot-color: Color of the dots (default: #ffffff)
       * --dot-border-radius: Border radius for dots (default: 128px for circular)
       * --spinner-duration: Animation duration (default: 3.8s)
       * --rotation-offset: Initial rotation offset in degrees (default: 220deg)
       */
      .windows10-spinner-container {
        --spinner-size: 120px;
        --spinner-scale: 0.8;
        --dot-size: 10px;
        --dot-color: #6ee7b7;
        --dot-border-radius: 128px;
        --spinner-duration: 3.8s;
        --spinner-easing: linear;
        --rotation-offset: 220deg;

        --dot-orbit-radius: calc((var(--spinner-size) - var(--dot-size)) / 2);

        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        width: var(--spinner-size);
        height: var(--spinner-size);
        transform: scale(var(--spinner-scale));
        transform-origin: center center;
      }

      .windows10-spinner-container > .dot {
        position: absolute;
        width: var(--dot-size);
        height: var(--dot-size);
        background-color: var(--dot-color);
        border-radius: var(--dot-border-radius);
        opacity: 0;
        top: 50%;
        left: 50%;
        z-index: 10;
      }

      .windows10-spinner-container > .dot:nth-child(1) {
        animation:
          win10-dot-1-rotate var(--spinner-duration) var(--spinner-easing) 0ms infinite,
          win10-dot-opacity var(--spinner-duration) var(--spinner-easing) 0ms infinite;
      }

      .windows10-spinner-container > .dot:nth-child(2) {
        animation:
          win10-dot-2-rotate var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.0439) infinite,
          win10-dot-opacity var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.0439) infinite;
      }

      .windows10-spinner-container > .dot:nth-child(3) {
        animation:
          win10-dot-3-rotate var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.0879) infinite,
          win10-dot-opacity var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.0879) infinite;
      }

      .windows10-spinner-container > .dot:nth-child(4) {
        animation:
          win10-dot-4-rotate var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.1318) infinite,
          win10-dot-opacity var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.1318) infinite;
      }

      .windows10-spinner-container > .dot:nth-child(5) {
        animation:
          win10-dot-5-rotate var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.1758) infinite,
          win10-dot-opacity var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.1758) infinite;
      }

      .windows10-spinner-container > .dot:nth-child(6) {
        animation:
          win10-dot-6-rotate var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.2197) infinite,
          win10-dot-opacity var(--spinner-duration) var(--spinner-easing)
            calc(var(--spinner-duration) * 0.2197) infinite;
      }

      @keyframes win10-dot-opacity {
        0% {
          opacity: 1;
        }
        73.9145% {
          opacity: 1;
        }
        73.9156% {

        }
        79.9017% {

        }
        100% {
          opacity: 0;
        }
      }
