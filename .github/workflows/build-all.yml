name: Build Templates and Multiple Electron Apps

on:
  # push:
  #   branches: ["main"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual build"
        required: false
        default: "Manual trigger"

jobs:
  # --- JOB 1: Build all Vite Project A's (The Resources) ---
  build-templates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - project_path: "template-projects/group-sort"
            game_id: "group-sort"
          - project_path: "template-projects/plane-quiz"
            game_id: "plane-quiz"
          - project_path: "template-projects/balloon-letter-picker"
            game_id: "balloon-letter-picker"
          - project_path: "template-projects/pair-matching"
            game_id: "pair-matching"
          - project_path: "template-projects/word-search"
            game_id: "word-search"
          - project_path: "template-projects/whack-a-mole"
            game_id: "whack-a-mole"
          - project_path: "template-projects/find-the-treasure"
            game_id: "find-the-treasure"

          # Add more Project A's (Templates) here:
          # - project_path: "apps/mini-game-2"
          #   game_id: "memory-match"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 4
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        shell: bash
        working-directory: ${{ matrix.project_path }}
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-vite-${{ hashFiles(format('{0}/yarn.lock', matrix.project_path)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-vite-

      - name: Install dependencies
        working-directory: ${{ matrix.project_path }}
        run: yarn install --immutable

      - name: Build Vite Template
        working-directory: ${{ matrix.project_path }}
        run: yarn build

      - name: Upload Template Artifact
        uses: actions/upload-artifact@v4
        with:
          name: template-${{ matrix.game_id }}
          path: ${{ matrix.project_path }}/dist/
          retention-days: 1

  # --- JOB 2: Build Multiple Electron Project B's ---
  build-electron:
    needs: build-templates
    strategy:
      fail-fast: false # Ensure one app's failure doesn't stop others
      matrix:
        include:
          # Configuration for Project B #1
          - project_path: "builder-projects/electron-app-mui"
            app_id: "builder-standard"
            os: windows-latest
          - project_path: "builder-projects/electron-app-mui"
            app_id: "builder-standard"
            os: ubuntu-latest

          # Configuration for Project B #2 (Add more apps here)
          # - project_path: "other-apps/secondary-builder"
          #   app_id: "builder-lite"
          #   os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 4
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      # 1. Download ALL templates built in Job 1
      - name: Download all templates
        uses: actions/download-artifact@v4
        with:
          path: ./temp-templates
          pattern: template-*
          merge-multiple: false

      # 2. Inject templates into this specific Project B's directory
      - name: Place templates into Electron resources
        shell: bash
        run: |
          for dir in ./temp-templates/template-*; do
            # Extract game-id from folder name
            GAME_ID=$(basename "$dir" | sed 's/template-//')
            TARGET_DIR="${{ matrix.project_path }}/templates/$GAME_ID/game"
            
            echo "Installing template $GAME_ID into $TARGET_DIR"
            mkdir -p "$TARGET_DIR"
            cp -rv "$dir"/* "$TARGET_DIR/"
          done

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        shell: bash
        working-directory: ${{ matrix.project_path }}
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-electron-${{ hashFiles(format('{0}/yarn.lock', matrix.project_path)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-electron-

      - name: Install dependencies
        working-directory: ${{ matrix.project_path }}
        run: yarn install --immutable

      - name: Package electron app
        working-directory: ${{ matrix.project_path }}
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            yarn build:win
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            yarn build:mac
          else
            yarn build:linux
          fi

      # Create a ready-to-build bundle
      - name: Prepare electron-builder ready bundle
        shell: bash
        run: |
          BUNDLE_DIR="./electron-bundle"
          mkdir -p "$BUNDLE_DIR"

          cp -r "${{ matrix.project_path }}/out" "$BUNDLE_DIR/"
          cp -r "${{ matrix.project_path }}/templates" "$BUNDLE_DIR/"
          cp "${{ matrix.project_path }}/package.json" "$BUNDLE_DIR/"

          [ -f "${{ matrix.project_path }}/electron-builder.yml" ] && \
            cp "${{ matrix.project_path }}/electron-builder.yml" "$BUNDLE_DIR/" || true

          # Optional: copy icons, assets, etc. if used
          cp -r "${{ matrix.project_path }}/resources" "$BUNDLE_DIR/" || true

      - name: Sanitize artifact name
        id: sanitize
        shell: bash
        run: |
          # Create a name like build-builder-standard-windows-latest
          echo "FINAL_NAME=${{ matrix.app_id }}-${{ matrix.os }}" >> $GITHUB_ENV

      - name: Upload pre-package bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}-bundle
          path: ./electron-bundle

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}-package
          path: |
            ${{ matrix.project_path }}/dist/*.exe
            ${{ matrix.project_path }}/dist/*.AppImage
            ${{ matrix.project_path }}/dist/*.deb
            ${{ matrix.project_path }}/dist/*.rpm
            ${{ matrix.project_path }}/dist/*.dmg
            ${{ matrix.project_path }}/dist/*.zip
            ${{ matrix.project_path }}/dist/*.7z
