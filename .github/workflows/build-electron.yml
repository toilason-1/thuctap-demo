name: Build Electron Projects

on:
  workflow_dispatch: # This enables the "Run workflow" button
    inputs:
      reason:
        description: "Reason for manual build"
        required: false
        default: "Manual trigger"

jobs:
  build-electron:
    strategy:
      matrix:
        include:
          - project: demo-desktop-app-electron/electron-app
            os: windows-latest
          - project: demo-desktop-app-electron/electron-app
            os: ubuntu-latest
          # - project: demo-desktop-app-electron/electron-app
          #   os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 4
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        shell: bash
        working-directory: ${{ matrix.project }}
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles(format('{0}/yarn.lock', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: yarn install --immutable

      - name: Package electron app
        working-directory: ${{ matrix.project }}
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            yarn build:win
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            yarn build:mac
          else
            yarn build:linux
          fi

      - name: Sanitize artifact name
        id: sanitize
        shell: bash
        run: |
          echo "ARTIFACT_NAME=build-electron-$(echo '${{ matrix.project }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ matrix.os }}
          path: |
            ${{ matrix.project }}/dist/*.exe
            ${{ matrix.project }}/dist/*.AppImage
            ${{ matrix.project }}/dist/*.deb
            ${{ matrix.project }}/dist/*.rpm
            ${{ matrix.project }}/dist/*.dmg
            ${{ matrix.project }}/dist/*.zip
